# Apache-VHost für Mundwerk — analog zu arbeitsstunden.proportiodivina.eu.
# Annahme: Repo liegt unter /home/thomas/mundwerk, Django-Root ist server/.
# Installation: nach /etc/apache2/sites-available/mundwerk.conf kopieren,
# dann a2ensite mundwerk && systemctl reload apache2.
# Siehe deploy/README.md für die komplette Einrichtung.

<VirtualHost *:443>
    ServerName mundwerk.proportiodivina.eu
    ServerAdmin info@proportiodivina.eu

    DocumentRoot /home/thomas/mundwerk/server

    WSGIDaemonProcess mundwerk python-home=/home/thomas/mundwerk/server/.venv python-path=/home/thomas/mundwerk/server
    WSGIProcessGroup mundwerk
    WSGIScriptAlias / /home/thomas/mundwerk/server/config/wsgi.py
    WSGIScriptReloading On
    # Wichtig für Mundwerk: parselmouth/numpy sind C-Extensions, die in
    # Python-Subinterpretern abstürzen — %{GLOBAL} ist hier Pflicht.
    WSGIApplicationGroup %{GLOBAL}

    <Directory /home/thomas/mundwerk/server/config>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    # Statische Dateien (Django-Admin): Ziel von "manage.py collectstatic"
    Alias /static/ /home/thomas/mundwerk/server/staticfiles/
    <Directory /home/thomas/mundwerk/server/staticfiles>
        Require all granted
    </Directory>

    # BEWUSST KEIN Alias für /media/: dort liegen die Nutzeraufnahmen
    # (personenbezogene Daten) — sie dürfen nicht öffentlich abrufbar sein.
    # Der Server braucht sie nur lesend für die Analyse.

    # Upload-Limit: eine kurze WAV-Aufnahme (16 kHz mono) bleibt weit
    # unter 10 MB; alles darüber ist kein legitimer Request.
    LimitRequestBody 10485760

    ErrorLog /var/log/apache2/mundwerk.error.log
    LogLevel info
    CustomLog /var/log/apache2/mundwerk.access.log combined

    ServerSignature On

    # SSL (Zertifikat vorher mit certbot erzeugen, siehe deploy/README.md)
    SSLEngine On
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/mundwerk.proportiodivina.eu/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/mundwerk.proportiodivina.eu/privkey.pem
</VirtualHost>
